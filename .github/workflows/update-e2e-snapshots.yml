name: Update E2E snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Regenerate Linux Playwright snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update snapshots
        run: npm run test:e2e:update

      - name: Commit Linux snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual/resume.spec.ts-snapshots/*-linux.png
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "Update Playwright Linux visual regression snapshots"
          git push
